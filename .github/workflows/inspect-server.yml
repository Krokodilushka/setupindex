name: Inspect deployment server

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Inspect Docker and reverse proxy
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" 'sh -s' <<'REMOTE'
          set -eu
          echo "USER=$(id -un)"
          echo "DOCKER_VERSION=$(docker version --format '{{.Server.Version}}')"
          echo "COMPOSE_VERSION=$(docker compose version --short)"
          echo "DEPLOY_PATH_OWNER=$(stat -c '%U:%G %a' /home/deploy/setupindex)"
          echo "CONTAINERS"
          docker ps --format '{{.Names}}|{{.Image}}|{{.Networks}}|{{.Ports}}'
          echo "NETWORKS"
          docker network ls --format '{{.Name}}|{{.Driver}}|{{.Scope}}'
          echo "PROXY_ARGUMENTS"
          for container in $(docker ps --format '{{.Names}}|{{.Image}}' | awk -F'|' 'tolower($0) ~ /(traefik|caddy)/ {print $1}'); do
            echo "[$container]"
            docker inspect "$container" --format '{{range .Args}}{{println .}}{{end}}'
          done
          REMOTE
