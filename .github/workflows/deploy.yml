name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: setupindex-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_PUBLIC_SITE_URL: https://setupindex.com

      - name: Upload generated site
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: setupindex-static
          path: .output/public
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: /home/deploy/setupindex
    steps:
      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: setupindex-static
          path: dist

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Verify deployment target
        run: |
          test "$DEPLOY_PATH" = "/home/deploy/setupindex"
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'install -d -m 755 /home/deploy/setupindex'

      - name: Deploy static files
        run: |
          rsync -az --delete-delay \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
