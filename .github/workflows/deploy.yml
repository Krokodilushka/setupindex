name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # Keyed by ref so a pull request build can never cancel a production deploy,
  # and never cancel main mid-rollout.
  group: setupindex-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Validate content
        run: npm run validate

      - name: Build SSR bundle
        run: npm run build
        env:
          NUXT_PUBLIC_SITE_URL: https://setupindex.com

      - name: Smoke-test the server
        run: npm run smoke

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            NUXT_PUBLIC_SITE_URL=https://setupindex.com
          tags: |
            ghcr.io/krokodilushka/setupindex-web:${{ github.sha }}
            ghcr.io/krokodilushka/setupindex-web:latest
          labels: |
            org.opencontainers.image.source=https://github.com/Krokodilushka/setupindex
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deployment bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: setupindex-deployment
          path: compose.yaml
          if-no-files-found: error
          retention-days: 3

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/deploy/setupindex' }}
    steps:
      - name: Download deployment bundle
        uses: actions/download-artifact@v8
        with:
          name: setupindex-deployment
          path: release

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Verify deployment target
        run: |
          test "$DEPLOY_PATH" = "/home/deploy/setupindex"
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'install -d -m 755 /home/deploy/setupindex'

      - name: Upload Compose release
        run: |
          rsync -az --delete-delay \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            release/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Pull and start container
        env:
          METRIKA_ID: ${{ vars.NUXT_PUBLIC_YANDEX_METRIKA_ID }}
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "SETUPINDEX_IMAGE_TAG='$GITHUB_SHA' METRIKA_ID='$METRIKA_ID' sh -s" <<'REMOTE'
          set -eu
          target=/home/deploy/setupindex
          test "$target" = "/home/deploy/setupindex"
          cd "$target"
          {
            printf 'SETUPINDEX_IMAGE_TAG=%s\n' "$SETUPINDEX_IMAGE_TAG"
            printf 'NUXT_PUBLIC_YANDEX_METRIKA_ID=%s\n' "${METRIKA_ID:-}"
          } > .env
          docker compose config --quiet
          docker compose pull web
          if ! docker compose up -d --remove-orphans --wait --wait-timeout 90 web; then
            docker compose ps --all
            docker compose logs --no-color --tail=100 web
            docker inspect setupindex-web \
              --format '{{range .State.Health.Log}}{{println .Output}}{{end}}' 2>/dev/null || true
            exit 1
          fi
          test "$(docker inspect setupindex-web --format '{{.State.Health.Status}}')" = "healthy"
          docker compose ps
          REMOTE

      - name: Verify public site
        run: |
          curl --fail --silent --show-error \
            --retry 10 --retry-delay 3 --retry-all-errors \
            -H 'Accept: text/html' \
            https://setupindex.com/en | grep -q 'SetupIndex'
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 --retry-all-errors \
            https://setupindex.com/sitemap_index.xml | grep -q '<sitemapindex'
          # The root must negotiate a locale rather than 404 now that Nginx is gone.
          curl --fail --silent --show-error --output /dev/null --write-out '%{redirect_url}\n' \
            --retry 5 --retry-delay 2 --retry-all-errors \
            -H 'Accept-Language: ru-RU,ru;q=0.9' \
            https://setupindex.com/ | grep -q '/ru'
