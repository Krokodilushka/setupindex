name: setupindex

services:
  web:
    image: setupindex-web:${SETUPINDEX_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: setupindex-web
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -qx 'ok'"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 4
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik
      traefik.http.routers.setupindex-web.rule: Host(`setupindex.com`)
      traefik.http.routers.setupindex-web.entrypoints: websecure
      traefik.http.routers.setupindex-web.tls: "true"
      traefik.http.routers.setupindex-web.tls.certresolver: letsencrypt
      traefik.http.services.setupindex-web.loadbalancer.server.port: "80"

networks:
  traefik:
    external: true
