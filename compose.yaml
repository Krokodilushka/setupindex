name: setupindex

services:
  web:
    image: ghcr.io/krokodilushka/setupindex-web:${SETUPINDEX_IMAGE_TAG:-latest}
    container_name: setupindex-web
    user: "${SETUPINDEX_UID:-1000}:${SETUPINDEX_GID:-1000}"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NUXT_PUBLIC_SITE_URL: https://setupindex.com
      NUXT_DATABASE_PATH: /data/setupindex.sqlite
      NUXT_UPLOADS_PATH: /data/uploads
      NUXT_MIGRATIONS_DIR: /app/drizzle
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:?NUXT_SESSION_PASSWORD is required}
      # Read at runtime by the SSR server: changing it needs a restart, not a rebuild.
      NUXT_PUBLIC_YANDEX_METRIKA_ID: ${NUXT_PUBLIC_YANDEX_METRIKA_ID:-}
    volumes:
      - type: bind
        source: ${SETUPINDEX_DATA_PATH:-./data}
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz | grep -qx 'ok'"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 4
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik
      traefik.http.routers.setupindex-web.rule: Host(`setupindex.com`)
      traefik.http.routers.setupindex-web.entrypoints: websecure
      traefik.http.routers.setupindex-web.tls: "true"
      traefik.http.routers.setupindex-web.tls.certresolver: letsencrypt
      traefik.http.routers.setupindex-web.middlewares: setupindex-compress
      traefik.http.middlewares.setupindex-compress.compress: "true"
      traefik.http.services.setupindex-web.loadbalancer.server.port: "3000"

networks:
  traefik:
    external: true
